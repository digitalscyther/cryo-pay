limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

upstream backend {
    server api:8080;
}

upstream frontend {
    server web:3000;
}

server {
    listen 80;
    server_name localhost;

    # TLS is terminated at Traefik (see infra repo). Nginx is internal only.

    client_max_body_size  64k;
    proxy_read_timeout    30s;
    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;

    # Security headers (defense-in-depth; Traefik also sets these in production)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "0" always;

    location = /ping {
        default_type application/json;
        return 200 '"pong"';
    }

    # CORS is handled by the Rust backend (see api/src/api/mod.rs)
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://backend/;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    # Swagger UI assets and OpenAPI spec (utoipa-swagger-ui fetches these at the root path)
    location /swagger-ui/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://backend/swagger-ui/;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    location /api-docs/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://backend/api-docs/;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    location / {
        proxy_pass http://frontend;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_redirect off;
    }
}
