services:
  api:
    build:
      context: api
      target: final
    restart: always
    env_file:
      - api/.env
    volumes:
      - ./api/data:/opt/data
    networks:
      - nginx_network
      - postgres_network
      - redis_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: web
      target: final
      args:
        - BASE_API_URL=/api
        - PROJECT_NAME=MyApp
        - CONTACTS={"email":"foo@bar.baz","telegram":"foo","linkedin":"foo"}
        - SEND_MESSAGE_URL=https://example.com
        - PROJECT_GITHUB_URL=https://github.com/foo/bar
    restart: always
    environment:
      NODE_ENV: production
    networks:
      - nginx_network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000',r=>process.exit(r.statusCode<400?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:1.27.2
    restart: always
    volumes:
      - ./files/nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    networks:
      - nginx_network
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cryo-pay.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.cryo-pay.entrypoints=websecure"
      - "traefik.http.routers.cryo-pay.tls.certresolver=letsencrypt"
      - "traefik.http.routers.cryo-pay.middlewares=security-headers@file"
      - "traefik.http.services.cryo-pay.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  postgres:
    image: postgres:17.0
    restart: always
    command: postgres -c 'max_connections=50'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Credentials injected via .env — see .env.example
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER:-cryo}
      - POSTGRES_DB=${POSTGRES_DB:-cryo}
    networks:
      - postgres_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cryo} -d ${POSTGRES_DB:-cryo}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  redis:
    image: 'bitnami/redis:7.4.1'
    restart: always
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - redis_data:/bitnami/redis/data
    networks:
      - redis_network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep -q PONG"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Mount pg_backups to host path or add S3 sync in infra for off-site storage
  pg-backup:
    image: prodrigestivill/postgres-backup-local:17-alpine
    restart: always
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${POSTGRES_DB:-cryo}
      - POSTGRES_USER=${POSTGRES_USER:-cryo}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - SCHEDULE=${BACKUP_SCHEDULE:-@daily}
      - BACKUP_KEEP_DAYS=${BACKUP_KEEP_DAYS:-7}
      - BACKUP_KEEP_WEEKS=${BACKUP_KEEP_WEEKS:-4}
      - BACKUP_KEEP_MONTHS=${BACKUP_KEEP_MONTHS:-6}
      - HEALTHCHECK_PORT=8080
    volumes:
      - pg_backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - postgres_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080 || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  nginx_network:
    driver: bridge
  postgres_network:
    driver: bridge
  redis_network:
    driver: bridge
  proxy:
    external: true

volumes:
    postgres_data:
    redis_data:
    pg_backups:
