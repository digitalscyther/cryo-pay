services:
  api:
    build:
      context: api
      target: final
    restart: always
    env_file:
      - api/.env
    volumes:
      - ./api/data:/opt/data
    networks:
      - nginx_network
      - postgres_network
      - redis_network

  web:
    build:
      context: web
      target: final
      args:
        - BASE_API_URL=/api
        - PROJECT_NAME=MyApp
        - CONTACTS={"email":"foo@bar.baz","telegram":"foo","linkedin":"foo"}
        - SEND_MESSAGE_URL=https://example.com
        - PROJECT_GITHUB_URL=https://github.com/foo/bar
    restart: always
    environment:
      NODE_ENV: production
    networks:
      - nginx_network

  nginx:
    image: nginx:1.27.2
    restart: always
    volumes:
      - ./files/nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - web
    networks:
      - nginx_network
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cryo-pay.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.cryo-pay.entrypoints=websecure"
      - "traefik.http.routers.cryo-pay.tls.certresolver=letsencrypt"
      - "traefik.http.routers.cryo-pay.middlewares=security-headers@file"
      - "traefik.http.services.cryo-pay.loadbalancer.server.port=80"

  postgres:
    image: postgres:17.0
    restart: always
    command: postgres -c 'max_connections=50'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Credentials injected via .env — see .env.example
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER:-cryo}
      - POSTGRES_DB=${POSTGRES_DB:-cryo}
    networks:
      - postgres_network

  redis:
    image: 'bitnami/redis:7.4.1'
    restart: always
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - redis_data:/bitnami/redis/data
    networks:
      - redis_network

  # Mount pg_backups to host path or add S3 sync in infra for off-site storage
  pg-backup:
    image: prodrigestivill/postgres-backup-local:17-alpine
    restart: always
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${POSTGRES_DB:-cryo}
      - POSTGRES_USER=${POSTGRES_USER:-cryo}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - SCHEDULE=${BACKUP_SCHEDULE:-@daily}
      - BACKUP_KEEP_DAYS=${BACKUP_KEEP_DAYS:-7}
      - BACKUP_KEEP_WEEKS=${BACKUP_KEEP_WEEKS:-4}
      - BACKUP_KEEP_MONTHS=${BACKUP_KEEP_MONTHS:-6}
      - HEALTHCHECK_PORT=8080
    volumes:
      - pg_backups:/backups
    depends_on:
      - postgres
    networks:
      - postgres_network

networks:
  nginx_network:
    driver: bridge
  postgres_network:
    driver: bridge
  redis_network:
    driver: bridge
  proxy:
    external: true

volumes:
    postgres_data:
    redis_data:
    pg_backups:
